{% extends "dashboard.html" %}

{% block title %}修改密码 - 工厂排单系统{% endblock %}

{% block main_content %}
<div class="content-wrapper" style="padding: 0;">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('order.dashboard') }}">控制台</a></li>
            <li class="breadcrumb-item active">修改密码</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-key me-2"></i>修改密码</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="old_password" class="form-label">原密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="old_password" name="old_password" 
                                   placeholder="请输入原密码" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label">新密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="new_password" name="new_password" 
                                   placeholder="请输入新密码（至少6位）" required minlength="6">
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">确认新密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" 
                                   placeholder="请再次输入新密码" required>
                        </div>
                        
                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-circle me-2"></i>确认修改
                            </button>
                            <a href="{{ url_for('order.dashboard') }}" class="btn btn-outline-secondary px-4">
                                取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
